<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Alina WMS & OMS - Enterprise System</title>
    
    <!-- PWA Meta Tags & Web Manifest -->
    <meta name="theme-color" content="#EC4899" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/alina-logo.svg" />
    
    <!-- iOS / Safari Add-To-HomeScreen Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="pink-pastel" />
    <meta name="apple-mobile-web-app-title" content="Alina" />
    <link rel="apple-touch-icon" href="/alina-logo.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Active service worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('[PWA] Service Worker registered in scope:', reg.scope))
            .catch((err) => console.error('[PWA] Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
