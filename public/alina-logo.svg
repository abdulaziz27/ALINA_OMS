<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Import premium Google Fonts for high-fashion boutique aesthetics -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&amp;family=Playfair+Display:ital,wght@1,700&amp;family=Montserrat:wght@500;700&amp;display=swap');
      
      .bg-clip {
        fill: url(#pinkWhiteGradient);
      }
      
      .inner-ring-thick {
        fill: none;
        stroke: #FFFFFF;
        stroke-width: 4;
        stroke-opacity: 0.85;
      }
      
      .inner-ring-thin {
        fill: none;
        stroke: #FFFFFF;
        stroke-width: 1.5;
        stroke-opacity: 0.4;
      }
      
      .brand-title {
        font-family: 'Cormorant Garamond', 'Playfair Display', 'Georgia', serif;
        font-size: 110px;
        font-style: italic;
        font-weight: 700;
        fill: #701A43; /* Sophisticated deep rose wine */
        text-anchor: middle;
      }
      
      .brand-subtitle {
        font-family: 'Montserrat', 'Inter', sans-serif;
        font-size: 26px;
        font-weight: 700;
        fill: #8E3263; /* Harmonized cohesive sub-heading rose */
        letter-spacing: 0.3em;
        text-anchor: middle;
      }
      
      .sparkle-path {
        fill: #701A43;
        opacity: 0.75;
      }
    </style>
    
    <!-- Premium Diagonal Pink & White Gentle Gradient -->
    <linearGradient id="pinkWhiteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="25%" stop-color="#FFF5F7" />
      <stop offset="70%" stop-color="#FCD5E4" />
      <stop offset="100%" stop-color="#F19CBE" />
    </linearGradient>
  </defs>

  <!-- Perfect circular background wrapper -->
  <circle cx="256" cy="256" r="256" class="bg-clip" />

  <!-- Delicate double thin aesthetic circular frames -->
  <circle cx="256" cy="256" r="236" class="inner-ring-thick" />
  <circle cx="256" cy="256" r="226" class="inner-ring-thin" />

  <!-- Group containing elegantly balanced elements -->
  <g>
    <!-- "Alina" with gorgeous slanted serif curves -->
    <text x="256" y="235" class="brand-title">Alina</text>
    
    <!-- Minimalist elegant divider lines with a center diamond sparkle -->
    <line x1="160" y1="265" x2="236" y2="265" stroke="#701A43" stroke-width="1" stroke-opacity="0.3" />
    <polygon points="256,260 261,265 256,270 251,265" class="sparkle-path" />
    <line x1="276" y1="265" x2="352" y2="265" stroke="#701A43" stroke-width="1" stroke-opacity="0.3" />
    
    <!-- "OFFICIAL" - wide tracking, minimalist geometric typography -->
    <text x="259" y="325" class="brand-subtitle">OFFICIAL</text>
  </g>
</svg>
